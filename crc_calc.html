<html><body><script>
function crc16(data){let c=0xFFFF;for(let b of data){c^=b<<8;for(let j=0;j<8;j++){if(c&0x8000)c=((c<<1)^0x1021)&0xFFFF;else c=(c<<1)&0xFFFF;}}return c;}
let A=[0x02,0x04,0x54,0x65,0x73,0x74];
let B=[0x02,0x05,0x20,0x54,0x65,0x73,0x74];
let C=[0x02,0x05,0x54,0x65,0x73,0x74,0x00];
let D=[0x02,0x05,0x54,0x65,0x73,0x74,0x0D];
let E=[0x02,0x05,0x54,0x65,0x73,0x74,0x0A];
document.write("A (no space): 0x"+crc16(A).toString(16).toUpperCase().padStart(4,'0')+"<br>");
document.write("B (with space): 0x"+crc16(B).toString(16).toUpperCase().padStart(4,'0')+"<br>");
document.write("C (len5+null): 0x"+crc16(C).toString(16).toUpperCase().padStart(4,'0')+"<br>");
document.write("D (len5+CR): 0x"+crc16(D).toString(16).toUpperCase().padStart(4,'0')+"<br>");
document.write("E (len5+LF): 0x"+crc16(E).toString(16).toUpperCase().padStart(4,'0')+"<br>");
document.write("<br>TX=0x6EFE? A:"+(crc16(A)===0x6EFE)+" B:"+(crc16(B)===0x6EFE)+" C:"+(crc16(C)===0x6EFE)+" D:"+(crc16(D)===0x6EFE)+" E:"+(crc16(E)===0x6EFE));
</script></body></html>
